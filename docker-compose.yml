services:
  db:
    image: postgres:16
    container_name: football_manager_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: football_manager
    ports:
      - "5432:5432"
    volumes:
      - football_manager_data:/var/lib/postgresql/data

volumes:
  football_manager_data: